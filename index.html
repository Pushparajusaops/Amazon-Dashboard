<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US → Amazon.ae · Order Fulfilment Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0B0E14;
  --bg2:#11151F;
  --panel:#141926;
  --panel2:#1A2133;
  --line:rgba(148,163,184,.12);
  --line2:rgba(148,163,184,.20);
  --ink:#F2F5FA;
  --ink2:#C3CCDB;
  --mute:#6B7688;
  --mute2:#8A95A8;

  --accent:#5B8DEF;
  --accent2:#7DA9F5;
  --accent-g:rgba(91,141,239,.12);

  --ok:#34D399;        --ok-g:rgba(52,211,153,.12);
  --warn:#FBBF24;      --warn-g:rgba(251,191,36,.12);
  --bad:#F87171;       --bad-g:rgba(248,113,113,.12);
  --neutral:#94A3B8;   --neutral-g:rgba(148,163,184,.10);
  --inv:#A78BFA;       --inv-g:rgba(167,139,250,.12);

  --r:10px; --r2:14px; --r3:18px;
  --sh:0 1px 2px rgba(0,0,0,.4),0 6px 24px rgba(0,0,0,.28);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',-apple-system,sans-serif;
  --t:.16s cubic-bezier(.4,0,.2,1);
}
.light{
  --bg:#F4F6FB; --bg2:#EAEFF7; --panel:#FFFFFF; --panel2:#F7F9FD;
  --line:rgba(15,23,42,.09); --line2:rgba(15,23,42,.16);
  --ink:#0F172A; --ink2:#33415A; --mute:#7A8699; --mute2:#5C6679;
  --accent-g:rgba(91,141,239,.10);
  --ok-g:rgba(16,160,110,.12); --warn-g:rgba(202,138,4,.13);
  --bad-g:rgba(220,60,60,.11); --neutral-g:rgba(100,116,139,.10);
  --inv-g:rgba(124,92,250,.11);
  --sh:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.07);
}

html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--body); background:var(--bg); color:var(--ink);
  line-height:1.5; min-height:100vh; letter-spacing:-.005em;
  background-image:radial-gradient(1200px 600px at 80% -10%,var(--accent-g),transparent 60%);
}
::selection{background:var(--accent);color:#fff;}

/* ── Header ── */
.hdr{
  position:sticky; top:0; z-index:50;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:blur(16px) saturate(150%);
  -webkit-backdrop-filter:blur(16px) saturate(150%);
  border-bottom:1px solid var(--line);
}
.hdr-in{
  max-width:1480px; margin:0 auto; padding:16px 28px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
.brand{display:flex;align-items:center;gap:13px;min-width:0;}
.glyph{
  width:42px;height:42px;border-radius:11px;flex:none;
  background:linear-gradient(140deg,var(--accent),#3B6FD4);
  display:grid;place-items:center; box-shadow:0 4px 14px rgba(91,141,239,.4);
  position:relative;overflow:hidden;
}
.glyph svg{width:23px;height:23px;}
.brand-txt h1{
  font-family:var(--disp); font-size:16px; font-weight:700;
  letter-spacing:-.02em; line-height:1.15; white-space:nowrap;
}
.brand-txt p{font-size:11.5px;color:var(--mute2);font-weight:500;margin-top:1px;letter-spacing:.01em;}

.hdr-spacer{flex:1 1 auto;}
.hdr-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.pill{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11.5px;font-weight:550;color:var(--mute2);
  padding:7px 12px;border-radius:99px;border:1px solid var(--line);
  background:var(--panel); white-space:nowrap;
}
.dot{width:7px;height:7px;border-radius:99px;background:var(--mute);}
.dot.live{background:var(--ok);box-shadow:0 0 0 3px var(--ok-g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink2);cursor:pointer;
  display:grid;place-items:center;transition:var(--t);flex:none;
}
.icon-btn:hover{border-color:var(--line2);color:var(--ink);transform:translateY(-1px);}
.icon-btn svg{width:17px;height:17px;}

/* ── Layout ── */
.wrap{max-width:1480px;margin:0 auto;padding:24px 28px 80px;}

/* ── Filter bar ── */
.filters{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);
  padding:18px 20px;margin-bottom:24px;box-shadow:var(--sh);
  display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;
}
.fgroup{display:flex;flex-direction:column;gap:7px;}
.fgroup>label{
  font-size:11px;font-weight:650;color:var(--mute2);
  text-transform:uppercase;letter-spacing:.07em;
}
.frow{display:flex;align-items:center;gap:8px;}
.date-in{
  font-family:var(--body);font-size:13px;font-weight:500;color:var(--ink);
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;transition:var(--t);color-scheme:dark;
}
.light .date-in{color-scheme:light;}
.date-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.frow .sep{font-size:12px;color:var(--mute);font-weight:500;}

.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
.seg button{
  font-family:var(--body);font-size:12.5px;font-weight:550;color:var(--mute2);
  background:none;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;
  transition:var(--t);white-space:nowrap;
}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,141,239,.35);}
.seg button:not(.on):hover{color:var(--ink);}

.quick{display:flex;gap:6px;flex-wrap:wrap;}
.quick button{
  font-family:var(--body);font-size:12px;font-weight:550;color:var(--mute2);
  background:var(--panel2);border:1px solid var(--line);padding:8px 12px;
  border-radius:8px;cursor:pointer;transition:var(--t);
}
.quick button:hover{border-color:var(--accent);color:var(--accent2);}
.quick button.on{background:var(--accent-g);border-color:var(--accent);color:var(--accent2);}

.btn-clear{
  font-family:var(--body);font-size:12px;font-weight:600;color:var(--mute2);
  background:none;border:1px solid var(--line);padding:9px 14px;border-radius:9px;
  cursor:pointer;transition:var(--t);margin-left:auto;
}
.btn-clear:hover{border-color:var(--bad);color:var(--bad);}

/* ── KPI grid ── */
.kpi-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));
  gap:14px;margin-bottom:14px;
}
.kpi{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);
  padding:18px 18px 16px;position:relative;overflow:hidden;
  box-shadow:var(--sh);transition:var(--t);
}
.kpi::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--bar,var(--accent));opacity:.85;}
.kpi:hover{transform:translateY(-2px);border-color:var(--line2);}
.kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kpi .lbl{font-size:11.5px;font-weight:600;color:var(--mute2);text-transform:uppercase;letter-spacing:.05em;}
.kpi .ic{
  width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  background:var(--ic-bg,var(--accent-g));color:var(--ic,var(--accent));flex:none;
}
.kpi .ic svg{width:16px;height:16px;}
.kpi .val{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
.kpi .sub{font-size:12px;color:var(--mute);margin-top:8px;font-weight:500;display:flex;align-items:center;gap:6px;}
.badge{
  font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;
  background:var(--neutral-g);color:var(--neutral);font-variant-numeric:tabular-nums;
}
.badge.g{background:var(--ok-g);color:var(--ok);}
.badge.r{background:var(--bad-g);color:var(--bad);}
.badge.a{background:var(--warn-g);color:var(--warn);}

/* ── Panels ── */
.row2{display:grid;grid-template-columns:1.35fr 1fr;gap:18px;margin:24px 0;}
@media(max-width:980px){.row2{grid-template-columns:1fr;}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);padding:22px;box-shadow:var(--sh);}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.panel-h h2{font-family:var(--disp);font-size:15px;font-weight:650;letter-spacing:-.01em;}
.panel-h .meta{font-size:12px;color:var(--mute);font-weight:500;}

/* ── Bar list (status breakdown) ── */
.bars{display:flex;flex-direction:column;gap:13px;}
.bar-row{display:grid;grid-template-columns:1fr;gap:6px;}
.bar-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bar-name{font-size:13px;font-weight:550;color:var(--ink2);display:flex;align-items:center;gap:8px;min-width:0;}
.bar-name .sw{width:9px;height:9px;border-radius:3px;flex:none;}
.bar-name span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-nums{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums;}
.bar-nums em{color:var(--mute);font-style:normal;font-weight:500;margin-left:5px;}
.bar-track{height:8px;border-radius:99px;background:var(--panel2);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── Donut ── */
.donut-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap;justify-content:center;}
.donut{position:relative;flex:none;}
.donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut .ctr .big{font-family:var(--disp);font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
.donut .ctr .cap{font-size:11px;color:var(--mute2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
.legend{display:flex;flex-direction:column;gap:11px;}
.leg-item{display:flex;align-items:center;gap:10px;font-size:13px;}
.leg-item .sw{width:11px;height:11px;border-radius:4px;flex:none;}
.leg-item .lt{color:var(--ink2);font-weight:500;flex:1;}
.leg-item .lv{font-family:var(--mono);font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}

/* ── Table ── */
.tbl-panel{margin-top:24px;}
.tbl-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.search{position:relative;flex:1;min-width:200px;max-width:380px;}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--mute);}
.search input{
  width:100%;font-family:var(--body);font-size:13px;color:var(--ink);
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px 10px 36px;transition:var(--t);
}
.search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.search input::placeholder{color:var(--mute);}

.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  font-family:var(--body);font-size:12px;font-weight:550;color:var(--mute2);
  background:var(--panel2);border:1px solid var(--line);padding:7px 12px;
  border-radius:99px;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:6px;
}
.chip:hover{border-color:var(--line2);color:var(--ink);}
.chip.on{color:#fff;border-color:transparent;}
.chip.on.s-closed{background:var(--ok);}
.chip.on.s-open{background:var(--accent);}
.chip.on.s-danger{background:var(--bad);}
.chip .cnt{font-family:var(--mono);font-size:11px;opacity:.85;}

.btn-dl{
  font-family:var(--body);font-size:12.5px;font-weight:600;color:#fff;
  background:var(--accent);border:none;padding:10px 16px;border-radius:10px;
  cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:7px;margin-left:auto;
  box-shadow:0 2px 10px rgba(91,141,239,.35);
}
.btn-dl:hover{background:var(--accent2);transform:translateY(-1px);}
.btn-dl svg{width:15px;height:15px;}

.tbl-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r2);}
table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:880px;}
thead th{
  position:sticky;top:0;background:var(--panel2);text-align:left;
  font-size:10.5px;font-weight:650;color:var(--mute2);text-transform:uppercase;letter-spacing:.05em;
  padding:12px 14px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--ink);}
thead th .ar{opacity:.4;margin-left:4px;font-size:9px;}
tbody td{padding:11px 14px;border-bottom:1px solid var(--line);color:var(--ink2);white-space:nowrap;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--panel2);}
td.id{font-family:var(--mono);font-size:11.5px;color:var(--mute2);}
td.prod{max-width:280px;white-space:normal;line-height:1.35;color:var(--ink2);}
td.date{font-family:var(--mono);font-size:11.5px;color:var(--mute2);font-variant-numeric:tabular-nums;}
.st-tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:7px;white-space:nowrap;}
.st-tag .sw{width:6px;height:6px;border-radius:99px;flex:none;}
.s-closed-t{background:var(--ok-g);color:var(--ok);}
.s-open-t{background:var(--accent-g);color:var(--accent2);}
.s-danger-t{background:var(--bad-g);color:var(--bad);}

.tbl-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;flex-wrap:wrap;}
.tbl-foot .info{font-size:12.5px;color:var(--mute);font-weight:500;}
.pager{display:flex;gap:6px;align-items:center;}
.pager button{
  font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink2);
  background:var(--panel2);border:1px solid var(--line);min-width:34px;height:34px;padding:0 9px;
  border-radius:8px;cursor:pointer;transition:var(--t);
}
.pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent2);}
.pager button.on{background:var(--accent);color:#fff;border-color:transparent;}
.pager button:disabled{opacity:.35;cursor:not-allowed;}

/* ── States ── */
.loading,.error,.empty{padding:80px 20px;text-align:center;}
.spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p,.empty p{color:var(--mute2);font-size:14px;}
.error{color:var(--bad);}
.error h3{font-family:var(--disp);font-size:17px;margin-bottom:8px;}
.error p{color:var(--mute2);font-size:13px;max-width:480px;margin:0 auto 16px;line-height:1.6;}
.error code{font-family:var(--mono);font-size:11.5px;background:var(--panel2);padding:2px 6px;border-radius:5px;color:var(--ink2);}
.empty svg{width:44px;height:44px;color:var(--mute);margin-bottom:14px;}

.skel{background:linear-gradient(90deg,var(--panel) 0%,var(--panel2) 50%,var(--panel) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{to{background-position:-200% 0}}

footer{text-align:center;padding:28px;color:var(--mute);font-size:12px;border-top:1px solid var(--line);margin-top:40px;}
footer a{color:var(--accent2);text-decoration:none;}
footer a:hover{text-decoration:underline;}

@media(max-width:640px){
  .wrap{padding:18px 16px 60px;} .hdr-in{padding:14px 16px;}
  .filters{padding:16px;} .kpi .val{font-size:26px;}
  .donut-wrap{flex-direction:column;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-in">
    <div class="brand">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-6 9 6v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <div class="brand-txt">
        <h1>US → Amazon.ae Fulfilment</h1>
        <p>Order procurement &amp; delivery tracker · Support 3</p>
      </div>
    </div>
    <div class="hdr-spacer"></div>
    <div class="hdr-tools">
      <span class="pill"><span class="dot live" id="liveDot"></span><span id="syncTxt">Syncing…</span></span>
      <button class="icon-btn" id="refreshBtn" title="Refresh data" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Theme">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- Filters -->
  <div class="filters" id="filterBar" style="display:none">
    <div class="fgroup">
      <label id="dateModeLbl">Date range · Order date</label>
      <div class="frow">
        <input type="date" class="date-in" id="dFrom">
        <span class="sep">→</span>
        <input type="date" class="date-in" id="dTo">
      </div>
    </div>
    <div class="fgroup">
      <label>Filter by</label>
      <div class="seg" id="dateMode">
        <button data-mode="order" class="on">Order date</button>
        <button data-mode="ship">Latest ship date</button>
      </div>
    </div>
    <div class="fgroup">
      <label>Quick ranges</label>
      <div class="quick" id="quickRanges">
        <button data-days="7">7d</button>
        <button data-days="30">30d</button>
        <button data-days="90">90d</button>
        <button data-days="0" class="on">All</button>
      </div>
    </div>
    <button class="btn-clear" id="clearBtn">Reset</button>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading orders from Google Sheets…</p>
    </div>
  </div>

</div>

<footer>
  Live data from <a id="sheetLink" href="#" target="_blank" rel="noopener">Google Sheets</a> ·
  Updates automatically when the sheet changes · Hosted on GitHub Pages
</footer>

<script>
/* ════════════════════════════════════════════════════════════
   CONFIG — your Google Sheet (must be shared "Anyone with link")
   ════════════════════════════════════════════════════════════ */
const SHEET_ID = "1o9FFZyHjVAgej2CqrNv-JcVCy-D1CfwPNwqmgI0Y_Xk";
const GID = "0";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

/* Column indices (0-based) matching your sheet layout */
const COL = {
  orderId:0, itemId:1, orderDate:2, earliestDel:3, latestShip:4,
  sku:5, product:6, qty:7, asin:8, purchaseDate:9, amazonEta:10,
  deliveredDate:11, releasedDate:12, awb:13, notProcured:14,
  toDubai:15, recvDubai:16, shipDubai:17, selfAwb:18,
  lastMile:19, lastMileDate:20, cancel:21, remark:22, isInv:23,
  status:24, orderState:25
};

/* ── State ── */
let DATA=[], FILT=[], dateMode="order", quickDays=0;
let tblPage=1, tblPer=25, tblSort={key:"orderDate",dir:-1}, tblSearch="", tblStateFilter="";

/* ── Helpers ── */
const $=s=>document.querySelector(s);
const nf=n=>n.toLocaleString("en-US");
const pct=(a,b)=>b>0?((a/b*100).toFixed(1)+"%"):"0%";

function parseDMY(s){
  if(!s) return null;
  s=(""+s).trim();
  const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){ const d=new Date(+m[3],+m[2]-1,+m[1]); return isNaN(d)?null:d; }
  const d=new Date(s); return isNaN(d)?null:d;
}
const fmtD=d=>d?`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`:"—";
const toISO=d=>d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`:"";

/* Classify each row's state — trusts the sheet's Order State col if present,
   otherwise derives from Status + latest ship date */
function deriveState(row){
  const sheetState=(row[COL.orderState]||"").trim().toLowerCase();
  if(sheetState.includes("closed")) return "closed";
  if(sheetState.includes("danger")) return "danger";
  if(sheetState.includes("open")) return "open";
  // fallback derivation
  const st=(row[COL.status]||"").toLowerCase();
  if(st.includes("delivered to customer")||st.includes("order cancelled")) return "closed";
  const ship=parseDMY(row[COL.latestShip]);
  const today=new Date(); today.setHours(0,0,0,0);
  if(ship && today>ship) return "danger";
  return "open";
}

/* ════════════════════════════════════════════════════════════
   LOAD
   ════════════════════════════════════════════════════════════ */
function load(){
  $("#syncTxt").textContent="Syncing…";
  $("#liveDot").style.background="var(--warn)";
  Papa.parse(CSV_URL,{
    download:true, skipEmptyLines:true,
    complete:res=>{
      const rows=res.data;
      if(!rows||rows.length<2){ showError("The sheet returned no rows."); return; }
      // drop header
      DATA=rows.slice(1).filter(r=>r[COL.orderId] && r[COL.orderId].trim());
      DATA.forEach(r=>{
        r._od=parseDMY(r[COL.orderDate]);
        r._ship=parseDMY(r[COL.latestShip]);
        r._state=deriveState(r);
      });
      $("#liveDot").style.background="var(--ok)";
      const now=new Date();
      $("#syncTxt").textContent="Updated "+now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      $("#sheetLink").href=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;
      initFilters();
      apply();
    },
    error:err=>showError(err.message||"Could not reach the sheet.")
  });
}

function showError(msg){
  $("#liveDot").style.background="var(--bad)";
  $("#syncTxt").textContent="Sync failed";
  $("#content").innerHTML=`
    <div class="error">
      <h3>Couldn't load the sheet</h3>
      <p>${msg}<br><br>Make sure the Google Sheet is shared as <strong>"Anyone with the link · Viewer"</strong>. The dashboard reads it through the public CSV export endpoint.</p>
      <p><code>${CSV_URL}</code></p>
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   FILTERS
   ════════════════════════════════════════════════════════════ */
function initFilters(){
  $("#filterBar").style.display="flex";
  const dates=DATA.map(r=>r._od).filter(Boolean).sort((a,b)=>a-b);
  if(dates.length){
    $("#dFrom").value=toISO(dates[0]);
    $("#dTo").value=toISO(dates[dates.length-1]);
  }
  $("#dateMode").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      $("#dateMode").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); dateMode=b.dataset.mode;
      $("#dateModeLbl").textContent="Date range · "+(dateMode==="order"?"Order date":"Latest ship date");
      apply();
    };
  });
  $("#quickRanges").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); quickDays=+b.dataset.days;
      if(quickDays>0){
        const to=new Date(); const from=new Date(); from.setDate(from.getDate()-quickDays);
        $("#dFrom").value=toISO(from); $("#dTo").value=toISO(to);
      }else if(dates.length){
        $("#dFrom").value=toISO(dates[0]); $("#dTo").value=toISO(dates[dates.length-1]);
      }
      apply();
    };
  });
  $("#dFrom").onchange=$("#dTo").onchange=()=>{
    $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    apply();
  };
  $("#clearBtn").onclick=()=>{
    if(dates.length){$("#dFrom").value=toISO(dates[0]);$("#dTo").value=toISO(dates[dates.length-1]);}
    $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    $("#quickRanges").querySelector('[data-days="0"]').classList.add("on");
    quickDays=0; tblSearch=""; tblStateFilter=""; tblPage=1;
    apply();
  };
}

function apply(){
  const mkLocal=(v,end)=>{ if(!v) return null; const [y,m,d]=v.split("-").map(Number); return new Date(y,m-1,d, end?23:0, end?59:0, end?59:0, end?999:0); };
  const from=mkLocal($("#dFrom").value,false);
  const to=mkLocal($("#dTo").value,true);
  FILT=DATA.filter(r=>{
    const d=dateMode==="order"?r._od:r._ship;
    if(!d) return !from && !to; // rows without the chosen date only show when no range set
    if(from && d<from) return false;
    if(to && d>to) return false;
    return true;
  });
  render();
}

/* ════════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════════ */
function render(){
  const total=FILT.length;
  const delivered=FILT.filter(r=>(r[COL.status]||"").toLowerCase().includes("delivered to customer")).length;
  const cancelled=FILT.filter(r=>(r[COL.status]||"").toLowerCase().includes("cancelled")).length;
  const notProc=FILT.filter(r=>(r[COL.status]||"").toLowerCase().includes("cannot procure")||(r[COL.status]||"").toLowerCase().includes("not purchased")).length;
  const open=FILT.filter(r=>r._state==="open").length;
  const danger=FILT.filter(r=>r._state==="danger").length;
  const closed=FILT.filter(r=>r._state==="closed").length;
  const effective=total-cancelled; // delivery rate excludes cancellations
  const delRate=pct(delivered,effective);

  $("#content").innerHTML=`
    <div class="kpi-grid">
      ${kpiCard("Total orders","var(--accent)","var(--accent-g)",icBox(),nf(total),"In selected range")}
      ${kpiCard("Delivered","var(--ok)","var(--ok-g)",icCheck(),nf(delivered),`<span class="badge g">${delRate}</span> of effective`)}
      ${kpiCard("Open","var(--accent2)","var(--accent-g)",icClock(),nf(open),"Within ship deadline")}
      ${kpiCard("Danger","var(--bad)","var(--bad-g)",icAlert(),nf(danger),"Past latest ship date")}
      ${kpiCard("Cancelled","var(--neutral)","var(--neutral-g)",icBan(),nf(cancelled),"Buyer cancelled")}
      ${kpiCard("Not procured","var(--warn)","var(--warn-g)",icX(),nf(notProc),"Couldn't purchase")}
    </div>

    <div class="row2">
      <div class="panel">
        <div class="panel-h"><h2>Status breakdown</h2><span class="meta">${nf(total)} orders</span></div>
        <div class="bars" id="statusBars"></div>
      </div>
      <div class="panel">
        <div class="panel-h"><h2>Order state</h2><span class="meta">Open vs Closed vs Danger</span></div>
        <div class="donut-wrap">
          <div id="donut"></div>
          <div class="legend">
            ${legItem("var(--ok)","Closed",closed,total)}
            ${legItem("var(--accent)","Open",open,total)}
            ${legItem("var(--bad)","Danger",danger,total)}
          </div>
        </div>
      </div>
    </div>

    ${tablePanel()}
  `;
  renderStatusBars();
  renderDonut(closed,open,danger,total);
  wireTable();
  renderTable();
}

function kpiCard(lbl,bar,icbg,ic,val,sub){
  return `<div class="kpi" style="--bar:${bar}">
    <div class="top"><span class="lbl">${lbl}</span><span class="ic" style="--ic:${bar};--ic-bg:${icbg}">${ic}</span></div>
    <div class="val">${val}</div><div class="sub">${sub}</div>
  </div>`;
}
function legItem(c,lbl,v,t){
  return `<div class="leg-item"><span class="sw" style="background:${c}"></span><span class="lt">${lbl}</span><span class="lv">${nf(v)} · ${pct(v,t)}</span></div>`;
}

/* Status bars — top statuses by count */
function renderStatusBars(){
  const counts={};
  FILT.forEach(r=>{ const s=(r[COL.status]||"—").trim()||"—"; counts[s]=(counts[s]||0)+1; });
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,9);
  const max=entries.length?entries[0][1]:1;
  const colorFor=s=>{
    s=s.toLowerCase();
    if(s.includes("delivered to customer")) return "var(--ok)";
    if(s.includes("cancel")) return "var(--neutral)";
    if(s.includes("cannot procure")||s.includes("not purchased")) return "var(--warn)";
    if(s.includes("delay")||s.includes("held")) return "var(--bad)";
    if(s.includes("in-transit")||s.includes("in-Transit")||s.includes("transit")) return "var(--accent)";
    if(s.includes("inventory")) return "var(--inv)";
    return "var(--accent2)";
  };
  $("#statusBars").innerHTML=entries.map(([name,n])=>`
    <div class="bar-row">
      <div class="bar-top">
        <div class="bar-name"><span class="sw" style="background:${colorFor(name)}"></span><span title="${name}">${name}</span></div>
        <div class="bar-nums">${nf(n)}<em>${pct(n,FILT.length)}</em></div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(n/max*100).toFixed(1)}%;background:${colorFor(name)}"></div></div>
    </div>`).join("") || `<p style="color:var(--mute);font-size:13px">No orders in range.</p>`;
}

/* Donut */
function renderDonut(closed,open,danger,total){
  const size=148, sw=22, r=(size-sw)/2, c=2*Math.PI*r;
  const segs=[["var(--ok)",closed],["var(--accent)",open],["var(--bad)",danger]];
  let off=0;
  const circles=segs.map(([col,v])=>{
    const frac=total?v/total:0, len=frac*c;
    const el=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${size/2} ${size/2})" stroke-linecap="butt"/>`;
    off+=len; return el;
  }).join("");
  $("#donut").innerHTML=`
    <div class="donut" style="width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="${sw}"/>
        ${circles}
      </svg>
      <div class="ctr"><span class="big">${pct(closed,total).replace("%","")}<span style="font-size:16px">%</span></span><span class="cap">Closed</span></div>
    </div>`;
}

/* ════════════════════════════════════════════════════════════
   TABLE
   ════════════════════════════════════════════════════════════ */
function tablePanel(){
  const sc={closed:0,open:0,danger:0};
  FILT.forEach(r=>sc[r._state]++);
  return `
  <div class="panel tbl-panel">
    <div class="panel-h"><h2>Order details</h2></div>
    <div class="tbl-controls">
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="tblSearch" placeholder="Search order ID, SKU, product, AWB…" value="${tblSearch.replace(/"/g,'&quot;')}">
      </div>
      <div class="chips" id="stateChips">
        <span class="chip s-closed ${tblStateFilter==='closed'?'on':''}" data-s="closed">Closed <span class="cnt">${sc.closed}</span></span>
        <span class="chip s-open ${tblStateFilter==='open'?'on':''}" data-s="open">Open <span class="cnt">${sc.open}</span></span>
        <span class="chip s-danger ${tblStateFilter==='danger'?'on':''}" data-s="danger">Danger <span class="cnt">${sc.danger}</span></span>
      </div>
      <button class="btn-dl" id="dlBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead><tr>
          ${th("orderId","Order ID")}${th("orderDate","Order date")}${th("latestShip","Latest ship")}
          ${th("sku","SKU")}${th("product","Product")}${th("status","Status")}${th("_state","State")}
        </tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
    <div class="tbl-foot">
      <span class="info" id="tblInfo"></span>
      <div class="pager" id="tblPager"></div>
    </div>
  </div>`;
}
function th(key,label){
  const ar=tblSort.key===key?(tblSort.dir>0?"▲":"▼"):"";
  return `<th data-k="${key}">${label}<span class="ar">${ar}</span></th>`;
}

function getTableRows(){
  let rows=FILT.slice();
  if(tblStateFilter) rows=rows.filter(r=>r._state===tblStateFilter);
  if(tblSearch){
    const q=tblSearch.toLowerCase();
    rows=rows.filter(r=>
      (r[COL.orderId]||"").toLowerCase().includes(q)||
      (r[COL.sku]||"").toLowerCase().includes(q)||
      (r[COL.product]||"").toLowerCase().includes(q)||
      (r[COL.awb]||"").toLowerCase().includes(q)||
      (r[COL.selfAwb]||"").toLowerCase().includes(q)||
      (r[COL.asin]||"").toLowerCase().includes(q)||
      (r[COL.status]||"").toLowerCase().includes(q));
  }
  const k=tblSort.key, dir=tblSort.dir;
  rows.sort((a,b)=>{
    let va,vb;
    if(k==="orderDate"){va=a._od||0;vb=b._od||0;}
    else if(k==="latestShip"){va=a._ship||0;vb=b._ship||0;}
    else if(k==="_state"){va=a._state;vb=b._state;}
    else{va=(a[COL[k]]||"").toLowerCase();vb=(b[COL[k]]||"").toLowerCase();}
    return va<vb?-dir:va>vb?dir:0;
  });
  return rows;
}

function renderTable(){
  const rows=getTableRows();
  const totalPages=Math.max(1,Math.ceil(rows.length/tblPer));
  if(tblPage>totalPages) tblPage=totalPages;
  const start=(tblPage-1)*tblPer;
  const pageRows=rows.slice(start,start+tblPer);
  const stTag={closed:"s-closed-t",open:"s-open-t",danger:"s-danger-t"};
  const stColor={closed:"var(--ok)",open:"var(--accent2)",danger:"var(--bad)"};

  $("#tblBody").innerHTML=pageRows.map(r=>`
    <tr>
      <td class="id">${r[COL.orderId]||"—"}</td>
      <td class="date">${fmtD(r._od)}</td>
      <td class="date">${fmtD(r._ship)}</td>
      <td class="id">${(r[COL.sku]||"—").replace(/^USZ_/,"")}</td>
      <td class="prod">${(r[COL.product]||"—").slice(0,90)}${(r[COL.product]||"").length>90?"…":""}</td>
      <td><span style="font-size:12px;color:var(--ink2)">${r[COL.status]||"—"}</span></td>
      <td><span class="st-tag ${stTag[r._state]}"><span class="sw" style="background:${stColor[r._state]}"></span>${r._state[0].toUpperCase()+r._state.slice(1)}</span></td>
    </tr>`).join("") || `<tr><td colspan="7"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>No orders match your filters.</p></div></td></tr>`;

  $("#tblInfo").textContent=rows.length
    ? `Showing ${nf(start+1)}–${nf(Math.min(start+tblPer,rows.length))} of ${nf(rows.length)}`
    : "No matching orders";

  // pager
  let pg="";
  const mk=(p,lbl=p,on=false,dis=false)=>`<button ${on?'class="on"':''} ${dis?'disabled':''} data-p="${p}">${lbl}</button>`;
  pg+=mk(tblPage-1,"‹",false,tblPage<=1);
  const win=[];
  for(let p=1;p<=totalPages;p++){
    if(p===1||p===totalPages||(p>=tblPage-1&&p<=tblPage+1)) win.push(p);
    else if(win[win.length-1]!=="…") win.push("…");
  }
  win.forEach(p=>{ pg+= p==="…" ? `<button disabled>…</button>` : mk(p,p,p===tblPage); });
  pg+=mk(tblPage+1,"›",false,tblPage>=totalPages);
  $("#tblPager").innerHTML=pg;
  $("#tblPager").querySelectorAll("button[data-p]").forEach(b=>{
    if(b.disabled) return;
    b.onclick=()=>{ tblPage=+b.dataset.p; renderTable(); };
  });
}

function wireTable(){
  $("#tblSearch").oninput=e=>{ tblSearch=e.target.value; tblPage=1; renderTable(); };
  $("#stateChips").querySelectorAll(".chip").forEach(c=>{
    c.onclick=()=>{ tblStateFilter=tblStateFilter===c.dataset.s?"":c.dataset.s; tblPage=1; render(); };
  });
  document.querySelectorAll("thead th[data-k]").forEach(t=>{
    t.onclick=()=>{
      const k=t.dataset.k;
      if(tblSort.key===k) tblSort.dir*=-1; else {tblSort.key=k;tblSort.dir=1;}
      renderTable();
      document.querySelectorAll("thead th .ar").forEach(a=>a.textContent="");
      t.querySelector(".ar").textContent=tblSort.dir>0?"▲":"▼";
    };
  });
  $("#dlBtn").onclick=exportCSV;
}

function exportCSV(){
  const rows=getTableRows();
  const head=["Order ID","Order Date","Latest Ship Date","SKU","ASIN","Product","QTY","Status","Order State","AWB","Self Ship AWB"];
  const lines=[head.join(",")];
  rows.forEach(r=>{
    const cells=[r[COL.orderId],fmtD(r._od),fmtD(r._ship),r[COL.sku],r[COL.asin],r[COL.product],r[COL.qty],r[COL.status],r._state,r[COL.awb],r[COL.selfAwb]];
    lines.push(cells.map(c=>`"${(""+(c||"")).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`amazon_ae_orders_${toISO(new Date())}.csv`;
  a.click();
}

/* ── Icons ── */
function icBox(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>';}
function icCheck(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>';}
function icClock(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';}
function icAlert(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>';}
function icBan(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l14.14 14.14"/></svg>';}
function icX(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>';}

/* ── Theme ── */
function setTheme(light){
  document.body.classList.toggle("light",light);
  $("#themeIcon").innerHTML=light
    ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
let isLight=false;
$("#themeBtn").onclick=()=>{ isLight=!isLight; setTheme(isLight); };

$("#refreshBtn").onclick=()=>{ $("#refreshBtn").style.transform="rotate(360deg)"; setTimeout(()=>$("#refreshBtn").style.transform="",400); load(); };

/* ── Boot ── */
load();
/* auto-refresh every 5 min */
setInterval(load,5*60*1000);
</script>
</body>
</html>
