<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US → Amazon.ae · Order Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0B0E14; --bg2:#11151F; --panel:#141926; --panel2:#1A2133;
  --line:rgba(148,163,184,.12); --line2:rgba(148,163,184,.20);
  --ink:#F2F5FA; --ink2:#C3CCDB; --mute:#6B7688; --mute2:#8A95A8;
  --accent:#5B8DEF; --accent2:#7DA9F5; --accent-g:rgba(91,141,239,.12);
  --ok:#34D399; --ok-g:rgba(52,211,153,.12);
  --warn:#FBBF24; --warn-g:rgba(251,191,36,.12);
  --bad:#F87171; --bad-g:rgba(248,113,113,.12);
  --neutral:#94A3B8; --neutral-g:rgba(148,163,184,.10);
  --inv:#A78BFA; --inv-g:rgba(167,139,250,.12);
  --r:10px; --r2:14px; --r3:18px;
  --sh:0 1px 2px rgba(0,0,0,.4),0 6px 24px rgba(0,0,0,.28);
  --sh-drawer:-8px 0 48px rgba(0,0,0,.5);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Space Grotesk',sans-serif;
  --body:'Inter',-apple-system,sans-serif;
  --t:.16s cubic-bezier(.4,0,.2,1);
}
.light{
  --bg:#F4F6FB; --bg2:#EAEFF7; --panel:#FFFFFF; --panel2:#F7F9FD;
  --line:rgba(15,23,42,.09); --line2:rgba(15,23,42,.16);
  --ink:#0F172A; --ink2:#33415A; --mute:#7A8699; --mute2:#5C6679;
  --accent-g:rgba(91,141,239,.10); --ok-g:rgba(16,160,110,.12);
  --warn-g:rgba(202,138,4,.13); --bad-g:rgba(220,60,60,.11);
  --neutral-g:rgba(100,116,139,.10); --inv-g:rgba(124,92,250,.11);
  --sh:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.07);
  --sh-drawer:-8px 0 48px rgba(15,23,42,.18);
}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh;letter-spacing:-.005em;background-image:radial-gradient(1200px 600px at 80% -10%,var(--accent-g),transparent 60%);}
::selection{background:var(--accent);color:#fff;}
mark{background:var(--warn);color:#3a2c00;border-radius:3px;padding:0 2px;font-weight:600;}
.light mark{background:#FDE68A;color:#5a4500;}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%);border-bottom:1px solid var(--line);}
.hdr-in{max-width:1480px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:13px;min-width:0;flex:none;}
.glyph{width:42px;height:42px;border-radius:11px;flex:none;background:linear-gradient(140deg,var(--accent),#3B6FD4);display:grid;place-items:center;box-shadow:0 4px 14px rgba(91,141,239,.4);}
.glyph svg{width:23px;height:23px;}
.brand-txt h1{font-family:var(--disp);font-size:16px;font-weight:700;letter-spacing:-.02em;line-height:1.15;white-space:nowrap;}
.brand-txt p{font-size:11.5px;color:var(--mute2);font-weight:500;margin-top:1px;}

/* Global search */
.gsearch{position:relative;flex:1;min-width:200px;max-width:520px;}
.gsearch>svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--mute);pointer-events:none;}
.gsearch input{width:100%;font-family:var(--body);font-size:13.5px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 14px 11px 40px;transition:var(--t);}
.gsearch input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.gsearch input::placeholder{color:var(--mute);}
.gsearch .kbd{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:11px;color:var(--mute);border:1px solid var(--line);border-radius:5px;padding:2px 6px;pointer-events:none;}

.ac{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--panel);border:1px solid var(--line2);border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden;z-index:70;max-height:60vh;overflow-y:auto;display:none;}
.ac.show{display:block;animation:acIn .15s ease;}
@keyframes acIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.ac-sec{padding:8px 0;}
.ac-sec+.ac-sec{border-top:1px solid var(--line);}
.ac-head{font-size:10.5px;font-weight:650;color:var(--mute);text-transform:uppercase;letter-spacing:.07em;padding:6px 16px 4px;display:flex;justify-content:space-between;align-items:center;}
.ac-head button{font-family:var(--body);font-size:10.5px;color:var(--mute2);background:none;border:none;cursor:pointer;text-transform:none;letter-spacing:0;}
.ac-head button:hover{color:var(--accent2);}
.ac-item{display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;transition:background var(--t);}
.ac-item:hover,.ac-item.sel{background:var(--panel2);}
.ac-ic{width:30px;height:30px;border-radius:8px;background:var(--accent-g);color:var(--accent);display:grid;place-items:center;flex:none;}
.ac-ic svg{width:15px;height:15px;}
.ac-ic.recent{background:var(--neutral-g);color:var(--neutral);}
.ac-body{min-width:0;flex:1;}
.ac-title{font-size:13px;font-weight:550;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-sub{font-size:11.5px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;flex:none;}
.ac-tag.closed{background:var(--ok-g);color:var(--ok);}
.ac-tag.open{background:var(--accent-g);color:var(--accent2);}
.ac-tag.danger{background:var(--bad-g);color:var(--bad);}

.hdr-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex:none;}
.pill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:550;color:var(--mute2);padding:7px 12px;border-radius:99px;border:1px solid var(--line);background:var(--panel);white-space:nowrap;}
.dot{width:7px;height:7px;border-radius:99px;background:var(--mute);}
.dot.live{background:var(--ok);box-shadow:0 0 0 3px var(--ok-g);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--ink2);cursor:pointer;display:grid;place-items:center;transition:var(--t);flex:none;}
.icon-btn:hover{border-color:var(--line2);color:var(--ink);transform:translateY(-1px);}
.icon-btn svg{width:17px;height:17px;}

/* ── Layout ── */
.wrap{max-width:1480px;margin:0 auto;padding:24px 28px 80px;}
.section-title{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--mute2);text-transform:uppercase;letter-spacing:.08em;margin:32px 0 14px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:"";flex:1;height:1px;background:var(--line);}

/* ── Filters ── */
.filters{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);padding:18px 20px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;}
.fgroup{display:flex;flex-direction:column;gap:7px;}
.fgroup>label{font-size:11px;font-weight:650;color:var(--mute2);text-transform:uppercase;letter-spacing:.07em;}
.frow{display:flex;align-items:center;gap:8px;}
.date-in{font-family:var(--body);font-size:13px;font-weight:500;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;transition:var(--t);color-scheme:dark;}
.light .date-in{color-scheme:light;}
.date-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.frow .sep{font-size:12px;color:var(--mute);}
.seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
.seg button{font-family:var(--body);font-size:12.5px;font-weight:550;color:var(--mute2);background:none;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;transition:var(--t);white-space:nowrap;}
.seg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,141,239,.35);}
.seg button:not(.on):hover{color:var(--ink);}
.quick{display:flex;gap:6px;flex-wrap:wrap;}
.quick button{font-family:var(--body);font-size:12px;font-weight:550;color:var(--mute2);background:var(--panel2);border:1px solid var(--line);padding:8px 12px;border-radius:8px;cursor:pointer;transition:var(--t);}
.quick button:hover{border-color:var(--accent);color:var(--accent2);}
.quick button.on{background:var(--accent-g);border-color:var(--accent);color:var(--accent2);}
.btn-clear{font-family:var(--body);font-size:12px;font-weight:600;color:var(--mute2);background:none;border:1px solid var(--line);padding:9px 14px;border-radius:9px;cursor:pointer;transition:var(--t);margin-left:auto;}
.btn-clear:hover{border-color:var(--bad);color:var(--bad);}
.btn-adv{font-family:var(--body);font-size:12px;font-weight:600;color:var(--accent2);background:var(--accent-g);border:1px solid transparent;padding:9px 14px;border-radius:9px;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:7px;}
.btn-adv:hover{border-color:var(--accent);}
.btn-adv svg{width:14px;height:14px;transition:transform var(--t);}
.btn-adv.open svg{transform:rotate(180deg);}

/* Advanced filter panel */
.adv{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);box-shadow:var(--sh);margin-bottom:24px;overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .3s ease,margin .3s ease;}
.adv.open{max-height:600px;opacity:1;}
.adv-in{padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
.adv-col label{font-size:11px;font-weight:650;color:var(--mute2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:10px;}
.ms-list{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;}
.ms-item{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink2);cursor:pointer;padding:5px 7px;border-radius:7px;transition:background var(--t);}
.ms-item:hover{background:var(--panel2);}
.ms-item input{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex:none;}
.ms-item .ct{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--mute);}
.adv-txt{width:100%;font-family:var(--body);font-size:13px;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;transition:var(--t);}
.adv-txt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-g);}
.toggle-row{display:flex;align-items:center;gap:11px;cursor:pointer;font-size:13px;color:var(--ink2);font-weight:500;}
.toggle{width:40px;height:23px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);position:relative;transition:var(--t);flex:none;}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:99px;background:var(--mute);transition:var(--t);}
.toggle.on{background:var(--accent-g);border-color:var(--accent);}
.toggle.on::after{transform:translateX(17px);background:var(--accent);}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:14px;}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r2);padding:18px 18px 16px;position:relative;overflow:hidden;box-shadow:var(--sh);transition:var(--t);}
.kpi::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--bar,var(--accent));opacity:.85;}
.kpi:hover{transform:translateY(-2px);border-color:var(--line2);}
.kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.kpi .lbl{font-size:11.5px;font-weight:600;color:var(--mute2);text-transform:uppercase;letter-spacing:.05em;}
.kpi .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--ic-bg,var(--accent-g));color:var(--ic,var(--accent));flex:none;}
.kpi .ic svg{width:16px;height:16px;}
.kpi .val{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
.kpi .sub{font-size:12px;color:var(--mute);margin-top:8px;font-weight:500;display:flex;align-items:center;gap:6px;}
.badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--neutral-g);color:var(--neutral);font-variant-numeric:tabular-nums;}
.badge.g{background:var(--ok-g);color:var(--ok);}
.badge.r{background:var(--bad-g);color:var(--bad);}
.badge.a{background:var(--warn-g);color:var(--warn);}

/* ── Panels ── */
.row2{display:grid;grid-template-columns:1.35fr 1fr;gap:18px;}
@media(max-width:980px){.row2{grid-template-columns:1fr;}}
.row-analytics{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r3);padding:22px;box-shadow:var(--sh);}
.panel-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.panel-h h2{font-family:var(--disp);font-size:15px;font-weight:650;letter-spacing:-.01em;}
.panel-h .meta{font-size:12px;color:var(--mute);font-weight:500;}

.bars{display:flex;flex-direction:column;gap:13px;}
.bar-row{display:grid;gap:6px;}
.bar-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.bar-name{font-size:13px;font-weight:550;color:var(--ink2);display:flex;align-items:center;gap:8px;min-width:0;}
.bar-name .sw{width:9px;height:9px;border-radius:3px;flex:none;}
.bar-name span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-nums{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums;}
.bar-nums em{color:var(--mute);font-style:normal;font-weight:500;margin-left:5px;}
.bar-track{height:8px;border-radius:99px;background:var(--panel2);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}

.donut-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap;justify-content:center;}
.donut{position:relative;flex:none;}
.donut .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut .ctr .big{font-family:var(--disp);font-size:32px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
.donut .ctr .cap{font-size:11px;color:var(--mute2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:5px;}
.legend{display:flex;flex-direction:column;gap:11px;}
.leg-item{display:flex;align-items:center;gap:10px;font-size:13px;}
.leg-item .sw{width:11px;height:11px;border-radius:4px;flex:none;}
.leg-item .lt{color:var(--ink2);font-weight:500;flex:1;}
.leg-item .lv{font-family:var(--mono);font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}

/* Stage funnel */
.funnel{display:flex;flex-direction:column;gap:9px;}
.fn-row{display:grid;grid-template-columns:140px 1fr 54px;align-items:center;gap:12px;}
.fn-lbl{font-size:12.5px;color:var(--ink2);font-weight:550;display:flex;align-items:center;gap:8px;}
.fn-lbl .fn-ic{width:24px;height:24px;border-radius:7px;background:var(--accent-g);color:var(--accent);display:grid;place-items:center;flex:none;}
.fn-lbl .fn-ic svg{width:13px;height:13px;}
.fn-track{height:26px;border-radius:7px;background:var(--panel2);overflow:hidden;position:relative;}
.fn-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s cubic-bezier(.4,0,.2,1);}
.fn-val{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;}

/* Volume chart */
.vhead-seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.vhead-seg button{font-family:var(--body);font-size:11.5px;font-weight:550;color:var(--mute2);background:none;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;transition:var(--t);}
.vhead-seg button.on{background:var(--accent);color:#fff;}
.vhead-seg button:not(.on):hover{color:var(--ink);}
.vchart{display:flex;align-items:flex-end;gap:5px;height:230px;padding-top:10px;}

/* SLA panel */
.sla-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px;}
.sla-stat{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r2);padding:16px 18px;}
.sla-stat .sl-lbl{font-size:11px;font-weight:600;color:var(--mute2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.sla-stat .sl-val{font-family:var(--disp);font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1;font-variant-numeric:tabular-nums;}
.sla-stat .sl-sub{font-size:11.5px;color:var(--mute);margin-top:6px;}
.sla-split{display:flex;height:18px;border-radius:99px;overflow:hidden;background:var(--panel2);margin-bottom:16px;}
.sla-split>span{transition:width .6s cubic-bezier(.4,0,.2,1);}
.sla-split .seg-e{background:var(--ok);}
.sla-split .seg-o{background:var(--accent);}
.sla-split .seg-l{background:var(--bad);}
.sla-leg{display:flex;gap:24px;flex-wrap:wrap;}
.sla-leg .it{display:flex;align-items:center;gap:9px;font-size:13px;}
.sla-leg .it .sw{width:11px;height:11px;border-radius:4px;flex:none;}
.sla-leg .it .lt{color:var(--ink2);font-weight:500;}
.sla-leg .it .lv{font-family:var(--mono);font-weight:600;color:var(--ink);margin-left:4px;}
.vbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;height:100%;justify-content:flex-end;}
.vbar{width:100%;max-width:38px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent2),var(--accent));transition:height .5s cubic-bezier(.4,0,.2,1),filter var(--t);cursor:pointer;min-height:3px;position:relative;}
.vbar:hover{filter:brightness(1.15);}
.vbar .vtip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity var(--t);z-index:5;}
.vbar:hover .vtip{opacity:1;}
.vlbl{font-size:10.5px;color:var(--mute);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}

/* ── Table ── */
.tbl-panel{margin-top:18px;}
.tbl-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{font-family:var(--body);font-size:12px;font-weight:550;color:var(--mute2);background:var(--panel2);border:1px solid var(--line);padding:7px 12px;border-radius:99px;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:6px;}
.chip:hover{border-color:var(--line2);color:var(--ink);}
.chip.on{color:#fff;border-color:transparent;}
.chip.on.s-closed{background:var(--ok);}
.chip.on.s-open{background:var(--accent);}
.chip.on.s-danger{background:var(--bad);}
.chip .cnt{font-family:var(--mono);font-size:11px;opacity:.85;}
.btn-dl{font-family:var(--body);font-size:12.5px;font-weight:600;color:#fff;background:var(--accent);border:none;padding:10px 16px;border-radius:10px;cursor:pointer;transition:var(--t);display:flex;align-items:center;gap:7px;margin-left:auto;box-shadow:0 2px 10px rgba(91,141,239,.35);}

<script>
/* ════════════════════════════════════════════════════════════════════
   ORDER INTELLIGENCE DASHBOARD — app.js
   US → Amazon.ae fulfilment tracker. Reads a public Google Sheet via its
   CSV export endpoint (no backend). Modular, commented, performance-minded.
   ════════════════════════════════════════════════════════════════════ */

/* ─────────────────────────── CONFIG ─────────────────────────── */
const SHEET_ID = "1o9FFZyHjVAgej2CqrNv-JcVCy-D1CfwPNwqmgI0Y_Xk";
const GID = "0";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

/* Column indices (0-based) — must match the sheet's column order */
const COL = {
  orderId:0, itemId:1, orderDate:2, earliestDel:3, latestShip:4,
  sku:5, product:6, qty:7, asin:8, purchaseDate:9, amazonEta:10,
  deliveredDate:11, releasedDate:12, awb:13, notProcured:14,
  toDubai:15, recvDubai:16, shipDubai:17, selfAwb:18,
  lastMile:19, lastMileDate:20, cancel:21, remark:22, isInv:23,
  status:24, orderState:25
};

/* Tunables for delay detection */
const STUCK_DAYS = 7;        // no progress for this many days → flag

/* ─────────────────────────── STATE ─────────────────────────── */
let DATA = [], FILT = [], dateMode = "order", quickDays = 0;
let tblPage = 1, tblPer = 25, tblSort = {key:"orderDate",dir:-1};
let tblStateFilter = "";                       // single chip filter (table)
let globalQuery = "";                          // global search string
let advStatusSel = new Set();                  // multi-select status filter
let advStateSel = new Set();                   // multi-select state filter
let advAwb = "", tgDelayed = false, tgInv = false, tgProcFail = false;
let volMode = "week";                           // daily / weekly / monthly volume toggle
let recentSearches = loadRecent();

/* ─────────────────────────── HELPERS ─────────────────────────── */
const $  = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const nf = n => n.toLocaleString("en-US");
const pct = (a,b) => b>0 ? ((a/b*100).toFixed(1)+"%") : "0%";
const esc = s => (""+s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const debounce = (fn,ms=120)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

/** Parse a DD/MM/YYYY (or other) string into a local-midnight Date. */
function parseDMY(s){
  if(!s) return null;
  s = (""+s).trim();
  const m = s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){ const d=new Date(+m[3],+m[2]-1,+m[1]); return isNaN(d)?null:d; }
  const d=new Date(s); return isNaN(d)?null:d;
}
const fmtD  = d => d ? `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}` : "—";
const fmtDT = d => d ? `${fmtD(d)}` : "—";
const toISO = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}` : "";
const today0 = () => { const t=new Date(); t.setHours(0,0,0,0); return t; };
const daysBetween = (a,b) => Math.round((b-a)/86400000);

/** Build a local Date from a yyyy-mm-dd input value (avoids UTC off-by-one). */
function mkLocal(v,end){
  if(!v) return null;
  const [y,m,d]=v.split("-").map(Number);
  return new Date(y,m-1,d, end?23:0, end?59:0, end?59:0, end?999:0);
}

/* ─────────────────────── CLASSIFICATION ─────────────────────── */
/** Open / Closed / Danger — trusts sheet's Order State col, else derives. */
function deriveState(row){
  const ss=(row[COL.orderState]||"").trim().toLowerCase();
  if(ss.includes("closed")) return "closed";
  if(ss.includes("danger")) return "danger";
  if(ss.includes("open"))   return "open";
  const st=(row[COL.status]||"").toLowerCase();
  if(st.includes("delivered to customer")||st.includes("order cancelled")) return "closed";
  const ship=parseDMY(row[COL.latestShip]);
  if(ship && today0()>ship) return "danger";
  return "open";
}

/* ──────────────────── ORDER JOURNEY MODEL ───────────────────
   Maps the sheet's date columns into an ordered list of milestones.
   Each milestone: {key,label,icon,date}. A milestone is "done" when its
   date exists; the first dated milestone after the last done one is the
   "current" stage. Delivered/cancelled closes the journey.            */
const JOURNEY = [
  {key:"placed",   label:"Order received",      col:COL.orderDate,     icon:"cart"},
  {key:"purchased",label:"Purchased from Amazon",col:COL.purchaseDate, icon:"card"},
  {key:"usWh",     label:"Received at US warehouse",col:COL.deliveredDate,icon:"box"},
  {key:"released", label:"Released for export",  col:COL.releasedDate,  icon:"unlock"},
  {key:"toDubai",  label:"Shipped to Dubai",     col:COL.toDubai,       icon:"plane"},
  {key:"recvDubai",label:"Received in Dubai",    col:COL.recvDubai,     icon:"pin"},
  {key:"lastmile", label:"Out for delivery",     col:COL.lastMileDate,  icon:"truck"},
  {key:"delivered",label:"Delivered to customer",col:null,             icon:"check"}
];

/** Compute per-order journey + health once, cache on the row object. */
function computeJourney(row){
  const status=(row[COL.status]||"").toLowerCase();
  const isDelivered = status.includes("delivered to customer");
  const isCancelled = status.includes("cancel");

  const steps = JOURNEY.map(m=>{
    let date=null;
    if(m.key==="delivered"){
      // delivered date = last mile date when status confirms delivery
      date = isDelivered ? (parseDMY(row[COL.lastMileDate])||parseDMY(row[COL.shipDubai])) : null;
    }else{
      date = parseDMY(row[m.col]);
    }
    return {...m, date};
  });

  // find last completed index
  let lastDone=-1;
  steps.forEach((s,i)=>{ if(s.date) lastDone=i; });

  // assign status to each step
  steps.forEach((s,i)=>{
    if(s.date) s.status="done";
    else if(i===lastDone+1 && !isDelivered && !isCancelled) s.status="current";
    else s.status="pending";
  });

  // delay flag on the current step if past latest ship date
  const ship=parseDMY(row[COL.latestShip]);
  const overdue = ship && today0()>ship && !isDelivered && !isCancelled;
  if(overdue){
    const cur=steps.find(s=>s.status==="current");
    if(cur) cur.status="delayed";
  }
  return {steps, isDelivered, isCancelled, overdue, lastDone};
}

/* ───────────────────── DELAY / HEALTH ───────────────────────
   Returns {level:'healthy'|'delayed'|'critical', reasons:[...]}.    */
function computeHealth(row){
  const status=(row[COL.status]||"").toLowerCase();
  const reasons=[];
  if(status.includes("delivered to customer")) return {level:"healthy",reasons:["Delivered"]};
  if(status.includes("cancel")) return {level:"healthy",reasons:["Cancelled / closed"]};

  const ship=parseDMY(row[COL.latestShip]);
  const t=today0();
  let critical=false, delayed=false;

  // 1) past latest ship date
  if(ship && t>ship){ const od=daysBetween(ship,t); reasons.push(`${od}d past latest ship date`); od>5?critical=true:delayed=true; }

  // 2) stuck — last known milestone date is old
  const j=computeJourney(row);
  const lastDated=[...j.steps].reverse().find(s=>s.date);
  if(lastDated && lastDated.date){
    const stuck=daysBetween(lastDated.date,t);
    if(stuck>=STUCK_DAYS){ reasons.push(`No update for ${stuck}d`); stuck>14?critical=true:delayed=true; }
  }

  // 3) missing tracking — shipped to Dubai but no last-mile AWB
  const shippedDubai=parseDMY(row[COL.shipDubai]);
  if(shippedDubai && !(row[COL.selfAwb]||"").trim()){ reasons.push("Missing last-mile tracking"); delayed=true; }

  // 4) procurement delay — ordered but not purchased after several days
  const od=parseDMY(row[COL.orderDate]);
  if(od && !(row[COL.purchaseDate]||"").trim() && !(row[COL.notProcured]||"").trim()){
    const wait=daysBetween(od,t);
    if(wait>=3){ reasons.push(`Not procured ${wait}d after order`); wait>7?critical=true:delayed=true; }
  }

  // 5) procurement failure (couldn't buy)
  if((row[COL.notProcured]||"").trim() && !(row[COL.purchaseDate]||"").trim()){
    reasons.push("Procurement issue: "+row[COL.notProcured]); critical=true;
  }

  if(critical) return {level:"critical",reasons};
  if(delayed)  return {level:"delayed",reasons};
  return {level:"healthy",reasons:["On track"]};
}

/* ─────────────────────────── SLA ───────────────────────────
   Commitment = latestShip(E) − orderDate(C). Actual = lastMileDate(U) −
   orderDate(C), only when last mile status(T)=Delivered. Returns null
   unless the order is delivered with all three dates present.          */
function computeSLA(row){
  const status=(row[COL.status]||"").toLowerCase();
  const lastMile=(row[COL.lastMile]||"").trim().toLowerCase();
  const delivered = status.includes("delivered to customer") || lastMile==="delivered";
  if(!delivered) return null;
  const c=parseDMY(row[COL.orderDate]);
  const e=parseDMY(row[COL.latestShip]);
  const u=parseDMY(row[COL.lastMileDate]);
  if(!(c&&e&&u)) return null;
  const sla=daysBetween(c,e);      // committed days
  const actual=daysBetween(c,u);   // delivered in days
  const diff=actual-sla;           // negative = early, 0 = on time, positive = late
  return {sla, actual, diff, verdict: diff<0?"early":diff===0?"ontime":"late"};
}

/** Searchable haystack for an order, cached on first build. */
function haystack(row){
  if(row._hay) return row._hay;
  row._hay = [COL.orderId,COL.sku,COL.product,COL.awb,COL.selfAwb,COL.asin,COL.itemId]
    .map(i=>(row[i]||"")).join(" ").toLowerCase();
  return row._hay;
}

/* ═══════════════════════════ LOAD ═══════════════════════════ */
function load(){
  $("#syncTxt").textContent="Syncing…";
  $("#liveDot").style.background="var(--warn)";
  Papa.parse(CSV_URL,{
    download:true, skipEmptyLines:true,
    complete:res=>{
      const rows=res.data;
      if(!rows||rows.length<2){ showError("The sheet returned no rows."); return; }
      DATA=rows.slice(1).filter(r=>r[COL.orderId] && r[COL.orderId].trim());
      // Pre-compute derived fields once (performance for large datasets)
      DATA.forEach(r=>{
        r._od=parseDMY(r[COL.orderDate]);
        r._ship=parseDMY(r[COL.latestShip]);
        r._state=deriveState(r);
        r._health=computeHealth(r);
        r._sla=computeSLA(r);
        r._hay=null; haystack(r);
      });
      $("#liveDot").style.background="var(--ok)";
      $("#syncTxt").textContent="Updated "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
      $("#sheetLink").href=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit#gid=${GID}`;
      initFilters();
      buildAdvancedFilters();
      apply();
    },
    error:err=>showError(err.message||"Could not reach the sheet.")
  });
}

function showError(msg){
  $("#liveDot").style.background="var(--bad)";
  $("#syncTxt").textContent="Sync failed";
  $("#content").innerHTML=`
    <div class="error">
      <h3>Couldn't load the sheet</h3>
      <p>${esc(msg)}<br><br>Make sure the Google Sheet is shared as <strong>"Anyone with the link · Viewer"</strong>. The dashboard reads it through the public CSV export endpoint.</p>
      <p><code>${esc(CSV_URL)}</code></p>
    </div>`;
}

/* ═══════════════════════════ FILTERS ═══════════════════════════ */
function initFilters(){
  $("#filterBar").style.display="flex";
  const dates=DATA.map(r=>r._od).filter(Boolean).sort((a,b)=>a-b);
  if(dates.length){ $("#dFrom").value=toISO(dates[0]); $("#dTo").value=toISO(dates[dates.length-1]); }

  $("#dateMode").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      $("#dateMode").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); dateMode=b.dataset.mode;
      $("#dateModeLbl").textContent="Date range · "+(dateMode==="order"?"Order date":"Latest ship date");
      apply();
    };
  });
  $("#quickRanges").querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{
      $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); quickDays=+b.dataset.days;
      if(quickDays>0){
        const to=new Date(), from=new Date(); from.setDate(from.getDate()-quickDays);
        $("#dFrom").value=toISO(from); $("#dTo").value=toISO(to);
      }else if(dates.length){
        $("#dFrom").value=toISO(dates[0]); $("#dTo").value=toISO(dates[dates.length-1]);
      }
      apply();
    };
  });
  $("#dFrom").onchange=$("#dTo").onchange=()=>{
    $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    apply();
  };
  $("#clearBtn").onclick=resetAll;
  $("#advBtn").onclick=()=>{ $("#advBtn").classList.toggle("open"); $("#advPanel").classList.toggle("open"); };
}

function resetAll(){
  const dates=DATA.map(r=>r._od).filter(Boolean).sort((a,b)=>a-b);
  if(dates.length){ $("#dFrom").value=toISO(dates[0]); $("#dTo").value=toISO(dates[dates.length-1]); }
  $("#quickRanges").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
  $("#quickRanges").querySelector('[data-days="0"]').classList.add("on");
  quickDays=0; tblStateFilter=""; tblPage=1;
  advStatusSel.clear(); advStateSel.clear(); advAwb=""; tgDelayed=tgInv=tgProcFail=false;
  globalQuery=""; $("#globalSearch").value="";
  buildAdvancedFilters();
  apply();
}

/** Build the multi-select lists in the advanced panel from live data. */
function buildAdvancedFilters(){
  // states
  const stateCounts={open:0,closed:0,danger:0};
  DATA.forEach(r=>stateCounts[r._state]++);
  $("#msState").innerHTML=["open","closed","danger"].map(s=>`
    <label class="ms-item"><input type="checkbox" data-state="${s}" ${advStateSel.has(s)?"checked":""}>
      ${s[0].toUpperCase()+s.slice(1)}<span class="ct">${stateCounts[s]}</span></label>`).join("");
  $("#msState").querySelectorAll("input").forEach(c=>c.onchange=()=>{
    c.checked?advStateSel.add(c.dataset.state):advStateSel.delete(c.dataset.state); apply();
  });

  // statuses (top 12 by frequency)
  const sc={};
  DATA.forEach(r=>{ const s=(r[COL.status]||"—").trim()||"—"; sc[s]=(sc[s]||0)+1; });
  const top=Object.entries(sc).sort((a,b)=>b[1]-a[1]).slice(0,12);
  $("#msStatus").innerHTML=top.map(([s,n])=>`
    <label class="ms-item"><input type="checkbox" data-status="${esc(s)}" ${advStatusSel.has(s)?"checked":""}>
      <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s)}</span><span class="ct">${n}</span></label>`).join("");
  $("#msStatus").querySelectorAll("input").forEach(c=>c.onchange=()=>{
    c.checked?advStatusSel.add(c.dataset.status):advStatusSel.delete(c.dataset.status); apply();
  });

  // awb + toggles
  const awbEl=$("#awbFilter"); awbEl.value=advAwb;
  awbEl.oninput=debounce(()=>{ advAwb=awbEl.value.trim(); apply(); },150);
  const wire=(id,getter,setter)=>{
    const el=$(id); el.classList.toggle("on",getter());
    el.querySelector(".toggle").classList.toggle("on",getter());
    el.onclick=()=>{ setter(!getter()); el.querySelector(".toggle").classList.toggle("on",getter()); apply(); };
  };
  wire("#tgDelayed",()=>tgDelayed,v=>tgDelayed=v);
  wire("#tgInv",()=>tgInv,v=>tgInv=v);
  wire("#tgProcFail",()=>tgProcFail,v=>tgProcFail=v);
}

/** Master filter — applies date range + advanced filters + global search. */
function apply(){
  const from=mkLocal($("#dFrom").value,false);
  const to=mkLocal($("#dTo").value,true);
  const q=globalQuery.toLowerCase();

  FILT=DATA.filter(r=>{
    // date range
    const d=dateMode==="order"?r._od:r._ship;
    if(from||to){ if(!d) return false; if(from&&d<from) return false; if(to&&d>to) return false; }
    // advanced — state
    if(advStateSel.size && !advStateSel.has(r._state)) return false;
    // advanced — status
    if(advStatusSel.size && !advStatusSel.has((r[COL.status]||"—").trim())) return false;
    // advanced — awb
    if(advAwb){ const a=advAwb.toLowerCase(); if(!((r[COL.awb]||"").toLowerCase().includes(a)||(r[COL.selfAwb]||"").toLowerCase().includes(a))) return false; }
    // toggles
    if(tgDelayed && r._health.level==="healthy") return false;
    if(tgInv && (r[COL.isInv]||"").trim().toUpperCase()!=="YES") return false;
    if(tgProcFail){ const ok=(r[COL.notProcured]||"").trim() && !(r[COL.purchaseDate]||"").trim(); if(!ok) return false; }
    // global search
    if(q && !haystack(r).includes(q)) return false;
    return true;
  });
  render();
}

/* ═══════════════════════════ RENDER ═══════════════════════════ */
function render(){
  const total=FILT.length;
  const delivered=FILT.filter(r=>(r[COL.status]||"").toLowerCase().includes("delivered to customer")).length;
  const cancelled=FILT.filter(r=>(r[COL.status]||"").toLowerCase().includes("cancel")).length;
  const notProc=FILT.filter(r=>{const s=(r[COL.status]||"").toLowerCase();return s.includes("cannot procure")||s.includes("not purchased");}).length;
  const open=FILT.filter(r=>r._state==="open").length;
  const danger=FILT.filter(r=>r._state==="danger").length;
  const closed=FILT.filter(r=>r._state==="closed").length;
  const effective=total-cancelled;
  const delRate=pct(delivered,effective);

  // analytics
  const fulfilTimes=FILT.map(r=>{
    const a=r._od, b=(r[COL.status]||"").toLowerCase().includes("delivered")?(parseDMY(r[COL.lastMileDate])||parseDMY(r[COL.shipDubai])):null;
    return (a&&b)?daysBetween(a,b):null;
  }).filter(v=>v!=null&&v>=0);
  const avgFulfil=fulfilTimes.length?(fulfilTimes.reduce((s,v)=>s+v,0)/fulfilTimes.length):0;
  const procAttempts=FILT.filter(r=>r._od).length;
  const procFails=FILT.filter(r=>(r[COL.notProcured]||"").trim()&&!(r[COL.purchaseDate]||"").trim()).length;
  const procFailPct=pct(procFails,procAttempts);
  const critical=FILT.filter(r=>r._health.level==="critical").length;

  $("#content").innerHTML=`
    <div class="section-title">Overview</div>
    <div class="kpi-grid">
      ${kpiCard("Total orders","var(--accent)","var(--accent-g)",icBox(),nf(total),"In selected range")}
      ${kpiCard("Delivered","var(--ok)","var(--ok-g)",icCheck(),nf(delivered),`<span class="badge g">${delRate}</span> success rate`)}
      ${kpiCard("Open","var(--accent2)","var(--accent-g)",icClock(),nf(open),"Within ship deadline")}
      ${kpiCard("Danger","var(--bad)","var(--bad-g)",icAlert(),nf(danger),"Past latest ship date")}
      ${kpiCard("Cancelled","var(--neutral)","var(--neutral-g)",icBan(),nf(cancelled),"Buyer cancelled")}
      ${kpiCard("Not procured","var(--warn)","var(--warn-g)",icX(),nf(notProc),"Couldn't purchase")}
    </div>

    <div class="section-title">Performance</div>
    <div class="kpi-grid">
      ${kpiCard("Avg fulfilment","var(--accent)","var(--accent-g)",icClock(),avgFulfil.toFixed(1)+"d","Order → delivered")}
      ${kpiCard("Delivery success","var(--ok)","var(--ok-g)",icCheck(),delRate,`${nf(delivered)} of ${nf(effective)} effective`)}
      ${kpiCard("Procurement fail %","var(--warn)","var(--warn-g)",icX(),procFailPct,`${nf(procFails)} couldn't be bought`)}
      ${kpiCard("Critical orders","var(--bad)","var(--bad-g)",icAlert(),nf(critical),"Need attention now")}
    </div>

    <div class="section-title">Breakdown</div>
    <div class="row2">
      <div class="panel">
        <div class="panel-h"><h2>Status breakdown</h2><span class="meta">${nf(total)} orders</span></div>
        <div class="bars" id="statusBars"></div>
      </div>
      <div class="panel">
        <div class="panel-h"><h2>Order state</h2><span class="meta">Open · Closed · Danger</span></div>
        <div class="donut-wrap"><div id="donut"></div>
          <div class="legend">
            ${legItem("var(--ok)","Closed",closed,total)}
            ${legItem("var(--accent)","Open",open,total)}
            ${legItem("var(--bad)","Danger",danger,total)}
          </div>
        </div>
      </div>
    </div>

    <div class="section-title">Delivery SLA — our commitment vs actual</div>
    <div class="panel" id="slaPanel"></div>

    <div class="section-title">Pipeline &amp; volume</div>
    <div class="row2">
      <div class="panel">
        <div class="panel-h"><h2>Orders by stage</h2><span class="meta">Where orders sit now</span></div>
        <div class="funnel" id="funnel"></div>
      </div>
      <div class="panel">
        <div class="panel-h">
          <h2>Order volume</h2>
          <div class="vhead-seg" id="volMode">
            <button data-v="day">Daily</button>
            <button data-v="week" class="on">Weekly</button>
            <button data-v="month">Monthly</button>
          </div>
        </div>
        <div class="vchart" id="volChart"></div>
      </div>
    </div>

    ${tablePanel()}
  `;
  renderStatusBars();
  renderDonut(closed,open,danger,total);
  renderSLA();
  renderFunnel();
  renderVolume("#volChart",volMode);
  $("#volMode").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    $("#volMode").querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); volMode=b.dataset.v; renderVolume("#volChart",volMode);
  });
  wireTable();
  renderTable();
}

function kpiCard(lbl,bar,icbg,ic,val,sub){
  return `<div class="kpi" style="--bar:${bar}">
    <div class="top"><span class="lbl">${lbl}</span><span class="ic" style="--ic:${bar};--ic-bg:${icbg}">${ic}</span></div>
    <div class="val">${val}</div><div class="sub">${sub}</div></div>`;
}
function legItem(c,lbl,v,t){
  return `<div class="leg-item"><span class="sw" style="background:${c}"></span><span class="lt">${lbl}</span><span class="lv">${nf(v)} · ${pct(v,t)}</span></div>`;
}

/* status color shared by bars/log */
function statusColor(s){
  s=s.toLowerCase();
  if(s.includes("delivered to customer")) return "var(--ok)";
  if(s.includes("cancel")) return "var(--neutral)";
  if(s.includes("cannot procure")||s.includes("not purchased")) return "var(--warn)";
  if(s.includes("delay")||s.includes("held")) return "var(--bad)";
  if(s.includes("transit")) return "var(--accent)";
  if(s.includes("inventory")) return "var(--inv)";
  return "var(--accent2)";
}

function renderDonut(closed,open,danger,total){
  const size=148,sw=22,r=(size-sw)/2,c=2*Math.PI*r;
  const segs=[["var(--ok)",closed],["var(--accent)",open],["var(--bad)",danger]];
  let off=0;
  const circles=segs.map(([col,v])=>{
    const len=(total?v/total:0)*c;
    const el=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${size/2} ${size/2})"/>`;
    off+=len; return el;
  }).join("");
  $("#donut").innerHTML=`<div class="donut" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="${sw}"/>${circles}
    </svg>
    <div class="ctr"><span class="big">${pct(closed,total).replace("%","")}<span style="font-size:16px">%</span></span><span class="cap">Closed</span></div>
  </div>`;
}

/** SLA panel: commitment (E−C) vs actual delivery (U−C) for delivered orders. */
function renderSLA(){
  const slas=FILT.map(r=>r._sla).filter(Boolean);
  const n=slas.length;
  const el=$("#slaPanel");
  if(!n){ el.innerHTML=`<p style="color:var(--mute);font-size:13px">No delivered orders with complete dates in this range.</p>`; return; }

  const avgSla=slas.reduce((s,v)=>s+v.sla,0)/n;
  const avgActual=slas.reduce((s,v)=>s+v.actual,0)/n;
  const early=slas.filter(v=>v.verdict==="early").length;
  const ontime=slas.filter(v=>v.verdict==="ontime").length;
  const late=slas.filter(v=>v.verdict==="late").length;
  const avgEarlyBy=(()=>{const e=slas.filter(v=>v.verdict==="early");return e.length?(e.reduce((s,v)=>s+Math.abs(v.diff),0)/e.length):0;})();
  const avgLateBy =(()=>{const l=slas.filter(v=>v.verdict==="late"); return l.length?(l.reduce((s,v)=>s+v.diff,0)/l.length):0;})();
  const metRate=pct(early+ontime,n);

  el.innerHTML=`
    <div class="panel-h"><h2>Delivered within commitment</h2><span class="meta">${nf(n)} delivered orders measured</span></div>
    <div class="sla-top">
      <div class="sla-stat"><div class="sl-lbl">Avg commitment</div><div class="sl-val">${avgSla.toFixed(1)}d</div><div class="sl-sub">Latest ship − order date</div></div>
      <div class="sla-stat"><div class="sl-lbl">Avg delivered in</div><div class="sl-val">${avgActual.toFixed(1)}d</div><div class="sl-sub">Last mile − order date</div></div>
      <div class="sla-stat"><div class="sl-lbl">SLA met</div><div class="sl-val" style="color:var(--ok)">${metRate}</div><div class="sl-sub">Early or on time</div></div>
      <div class="sla-stat"><div class="sl-lbl">Avg days early</div><div class="sl-val" style="color:var(--ok)">${avgEarlyBy.toFixed(1)}d</div><div class="sl-sub">When beating SLA</div></div>
      <div class="sla-stat"><div class="sl-lbl">Avg days late</div><div class="sl-val" style="color:var(--bad)">${avgLateBy.toFixed(1)}d</div><div class="sl-sub">When past SLA</div></div>
    </div>
    <div class="sla-split">
      <span class="seg-e" style="width:${(early/n*100).toFixed(1)}%"></span>
      <span class="seg-o" style="width:${(ontime/n*100).toFixed(1)}%"></span>
      <span class="seg-l" style="width:${(late/n*100).toFixed(1)}%"></span>
    </div>
    <div class="sla-leg">
      <div class="it"><span class="sw" style="background:var(--ok)"></span><span class="lt">Delivered early</span><span class="lv">${nf(early)} · ${pct(early,n)}</span></div>
      <div class="it"><span class="sw" style="background:var(--accent)"></span><span class="lt">On time</span><span class="lv">${nf(ontime)} · ${pct(ontime,n)}</span></div>
      <div class="it"><span class="sw" style="background:var(--bad)"></span><span class="lt">Delivered late</span><span class="lv">${nf(late)} · ${pct(late,n)}</span></div>
    </div>`;
}

/** Orders-by-stage funnel: count orders whose furthest milestone is each stage. */
function renderFunnel(){
  const stageCounts=JOURNEY.map(()=>0);
  FILT.forEach(r=>{
    const j=computeJourney(r);
    let idx=j.isDelivered?JOURNEY.length-1:Math.max(0,j.lastDone);
    stageCounts[idx]++;
  });
  const max=Math.max(1,...stageCounts);
  const icons={cart:icCart(),card:icCard(),box:icBox(),unlock:icUnlock(),plane:icPlane(),pin:icPin(),truck:icTruck(),check:icCheck()};
  $("#funnel").innerHTML=JOURNEY.map((m,i)=>`
    <div class="fn-row">
      <div class="fn-lbl"><span class="fn-ic">${icons[m.icon]}</span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.label}</span></div>
      <div class="fn-track"><div class="fn-fill" style="width:${Math.max(stageCounts[i]/max*100,stageCounts[i]>0?2.5:0).toFixed(1)}%"></div></div>
      <div class="fn-val">${nf(stageCounts[i])}</div>
    </div>`).join("");
}

/** Volume chart bucketed by day, week (Mon), or month. */
function renderVolume(sel,mode){
  const buckets={};
  FILT.forEach(r=>{
    if(!r._od) return;
    let key,label;
    if(mode==="day"){
      key=toISO(r._od); label=`${String(r._od.getDate()).padStart(2,"0")}/${String(r._od.getMonth()+1).padStart(2,"0")}`;
    }else if(mode==="week"){
      const d=new Date(r._od); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); // Monday
      key=toISO(d); label=`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
    }else{
      key=`${r._od.getFullYear()}-${String(r._od.getMonth()+1).padStart(2,"0")}`;
      label=r._od.toLocaleString("en-US",{month:"short",year:"2-digit"});
    }
    (buckets[key]=buckets[key]||{label,n:0}).n++;
  });
  const take=mode==="day"?30:mode==="week"?16:12;   // most recent N buckets
  const keys=Object.keys(buckets).sort().slice(-take);
  const max=Math.max(1,...keys.map(k=>buckets[k].n));
  $(sel).innerHTML=keys.length?keys.map(k=>{
    const b=buckets[k];
    return `<div class="vbar-wrap"><div class="vbar" style="height:${(b.n/max*100).toFixed(1)}%"><span class="vtip">${b.label}: ${nf(b.n)} orders</span></div><span class="vlbl">${b.label}</span></div>`;
  }).join(""):`<p style="color:var(--mute);font-size:13px;margin:auto">No data in range.</p>`;
}

/* ═══════════════════════════ TABLE ═══════════════════════════ */
function tablePanel(){
  const sc={closed:0,open:0,danger:0}; FILT.forEach(r=>sc[r._state]++);
  return `
  <div class="panel tbl-panel">
    <div class="panel-h"><h2>Order details</h2><span class="meta">Click any row for full journey</span></div>
    <div class="tbl-controls">
      <div class="chips" id="stateChips">
        <span class="chip s-closed ${tblStateFilter==='closed'?'on':''}" data-s="closed">Closed <span class="cnt">${sc.closed}</span></span>
        <span class="chip s-open ${tblStateFilter==='open'?'on':''}" data-s="open">Open <span class="cnt">${sc.open}</span></span>
        <span class="chip s-danger ${tblStateFilter==='danger'?'on':''}" data-s="danger">Danger <span class="cnt">${sc.danger}</span></span>
      </div>
      <button class="btn-dl" id="dlBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="tbl-scroll"><table>
      <thead><tr>
        ${th("orderId","Order ID")}${th("orderDate","Order date")}${th("latestShip","Latest ship")}
        ${th("sku","SKU")}${th("product","Product")}${th("status","Status")}${th("_health","Health")}${th("_state","State")}
      </tr></thead>
      <tbody id="tblBody"></tbody>
    </table></div>
    <div class="tbl-foot"><span class="info" id="tblInfo"></span><div class="pager" id="tblPager"></div></div>
  </div>`;
}
function th(key,label){
  const ar=tblSort.key===key?(tblSort.dir>0?"▲":"▼"):"";
  return `<th data-k="${key}">${label}<span class="ar">${ar}</span></th>`;
}

/** Resolve table rows: chip filter + sort. (Global/advanced already in FILT.) */
function getTableRows(){
  let rows=FILT.slice();
  if(tblStateFilter) rows=rows.filter(r=>r._state===tblStateFilter);
  const k=tblSort.key,dir=tblSort.dir;
  const rank={healthy:0,delayed:1,critical:2};
  rows.sort((a,b)=>{
    let va,vb;
    if(k==="orderDate"){va=a._od||0;vb=b._od||0;}
    else if(k==="latestShip"){va=a._ship||0;vb=b._ship||0;}
    else if(k==="_state"){va=a._state;vb=b._state;}
    else if(k==="_health"){va=rank[a._health.level];vb=rank[b._health.level];}
    else{va=(a[COL[k]]||"").toLowerCase();vb=(b[COL[k]]||"").toLowerCase();}
    return va<vb?-dir:va>vb?dir:0;
  });
  return rows;
}

function renderTable(){
  const rows=getTableRows();
  const totalPages=Math.max(1,Math.ceil(rows.length/tblPer));
  if(tblPage>totalPages) tblPage=totalPages;
  const start=(tblPage-1)*tblPer, pageRows=rows.slice(start,start+tblPer);
  const stTag={closed:"s-closed-t",open:"s-open-t",danger:"s-danger-t"};
  const stColor={closed:"var(--ok)",open:"var(--accent2)",danger:"var(--bad)"};
  const hIcon={healthy:"✓",delayed:"⚠",critical:"🚨"};

  $("#tblBody").innerHTML=pageRows.map((r,i)=>{
    const gi=DATA.indexOf(r);
    return `<tr data-i="${gi}">
      <td class="id">${hl(r[COL.orderId]||"—")}</td>
      <td class="date">${fmtD(r._od)}</td>
      <td class="date">${fmtD(r._ship)}</td>
      <td class="id">${hl((r[COL.sku]||"—").replace(/^USZ_/,""))}</td>
      <td class="prod">${hl((r[COL.product]||"—").slice(0,90))}${(r[COL.product]||"").length>90?"…":""}</td>
      <td><span style="font-size:12px;color:var(--ink2)">${esc(r[COL.status]||"—")}</span></td>
      <td><span class="health ${r._health.level}">${hIcon[r._health.level]} ${r._health.level[0].toUpperCase()+r._health.level.slice(1)}</span></td>
      <td><span class="st-tag ${stTag[r._state]}"><span class="sw" style="background:${stColor[r._state]}"></span>${r._state[0].toUpperCase()+r._state.slice(1)}</span></td>
    </tr>`;
  }).join("") || `<tr><td colspan="8"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>No orders match your filters.</p></div></td></tr>`;

  // row click → drawer
  $("#tblBody").querySelectorAll("tr[data-i]").forEach(tr=>tr.onclick=()=>openDrawer(DATA[+tr.dataset.i]));

  $("#tblInfo").textContent=rows.length?`Showing ${nf(start+1)}–${nf(Math.min(start+tblPer,rows.length))} of ${nf(rows.length)}`:"No matching orders";

  // pager
  let pg=""; const mk=(p,lbl=p,on=false,dis=false)=>`<button ${on?'class="on"':''} ${dis?'disabled':''} data-p="${p}">${lbl}</button>`;
  pg+=mk(tblPage-1,"‹",false,tblPage<=1);
  const win=[];
  for(let p=1;p<=totalPages;p++){
    if(p===1||p===totalPages||(p>=tblPage-1&&p<=tblPage+1)) win.push(p);
    else if(win[win.length-1]!=="…") win.push("…");
  }
  win.forEach(p=>pg+= p==="…"?`<button disabled>…</button>`:mk(p,p,p===tblPage));
  pg+=mk(tblPage+1,"›",false,tblPage>=totalPages);
  $("#tblPager").innerHTML=pg;
  $("#tblPager").querySelectorAll("button[data-p]").forEach(b=>{ if(!b.disabled) b.onclick=()=>{tblPage=+b.dataset.p;renderTable();}; });
}

/** Highlight global-search matches in a cell value. */
function hl(text){
  text=""+text;
  if(!globalQuery) return esc(text);
  const i=text.toLowerCase().indexOf(globalQuery.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+globalQuery.length))+"</mark>"+esc(text.slice(i+globalQuery.length));
}

function wireTable(){
  $("#stateChips").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    tblStateFilter=tblStateFilter===c.dataset.s?"":c.dataset.s; tblPage=1; render();
  });
  $$("thead th[data-k]").forEach(t=>t.onclick=()=>{
    const k=t.dataset.k;
    if(tblSort.key===k) tblSort.dir*=-1; else {tblSort.key=k;tblSort.dir=1;}
    renderTable();
  });
  $("#dlBtn").onclick=exportCSV;
}

function exportCSV(){
  const rows=getTableRows();
  const head=["Order ID","Order Date","Latest Ship Date","SKU","ASIN","Product","QTY","Status","Order State","Health","AWB","Self Ship AWB"];
  const lines=[head.join(",")];
  rows.forEach(r=>{
    const cells=[r[COL.orderId],fmtD(r._od),fmtD(r._ship),r[COL.sku],r[COL.asin],r[COL.product],r[COL.qty],r[COL.status],r._state,r._health.level,r[COL.awb],r[COL.selfAwb]];
    lines.push(cells.map(c=>`"${(""+(c||"")).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`amazon_ae_orders_${toISO(new Date())}.csv`; a.click();
}

/* ═══════════════════ GLOBAL SEARCH + AUTOCOMPLETE ═══════════════════ */
const gInput=$("#globalSearch"), acBox=$("#acBox");
let acIndex=-1, acItems=[];

const runSearch=debounce(()=>{ globalQuery=gInput.value.trim(); tblPage=1; apply(); },180);

gInput.addEventListener("input",()=>{ buildAutocomplete(gInput.value.trim()); runSearch(); });
gInput.addEventListener("focus",()=>buildAutocomplete(gInput.value.trim()));
gInput.addEventListener("keydown",e=>{
  if(e.key==="ArrowDown"){ e.preventDefault(); acIndex=Math.min(acIndex+1,acItems.length-1); paintAcSel(); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); acIndex=Math.max(acIndex-1,-1); paintAcSel(); }
  else if(e.key==="Enter"){
    if(acIndex>=0&&acItems[acIndex]) acItems[acIndex].onclick();
    else { commitSearch(gInput.value.trim()); acBox.classList.remove("show"); }
  }else if(e.key==="Escape"){ acBox.classList.remove("show"); gInput.blur(); }
});
document.addEventListener("click",e=>{ if(!$("#gsearch").contains(e.target)) acBox.classList.remove("show"); });

/** Build autocomplete: matching orders + recent searches. */
function buildAutocomplete(q){
  acIndex=-1; acItems=[];
  let html="";

  if(q.length>=2){
    const ql=q.toLowerCase();
    const matches=[];
    for(let i=0;i<DATA.length && matches.length<6;i++){ if(haystack(DATA[i]).includes(ql)) matches.push(DATA[i]); }
    if(matches.length){
      html+=`<div class="ac-sec"><div class="ac-head">Orders</div>`+
        matches.map(r=>{
          const sku=(r[COL.sku]||"").replace(/^USZ_/,"");
          return `<div class="ac-item" data-id="${esc(r[COL.orderId])}">
            <div class="ac-ic">${icBox()}</div>
            <div class="ac-body"><div class="ac-title">${acHl(r[COL.orderId],q)}</div>
            <div class="ac-sub">${acHl(sku,q)} · ${esc((r[COL.product]||"").slice(0,42))}</div></div>
            <span class="ac-tag ${r._state}">${r._state}</span></div>`;
        }).join("")+`</div>`;
    }else{
      html+=`<div class="ac-sec"><div class="ac-item" style="cursor:default"><div class="ac-body"><div class="ac-sub">No matches for "${esc(q)}"</div></div></div></div>`;
    }
  }

  if(recentSearches.length && q.length<2){
    html+=`<div class="ac-sec"><div class="ac-head">Recent searches<button id="clrRecent">Clear</button></div>`+
      recentSearches.map(s=>`<div class="ac-item" data-recent="${esc(s)}">
        <div class="ac-ic recent">${icClock()}</div><div class="ac-body"><div class="ac-title">${esc(s)}</div></div></div>`).join("")+`</div>`;
  }

  if(!html){ acBox.classList.remove("show"); return; }
  acBox.innerHTML=html; acBox.classList.add("show");

  // wire items
  acBox.querySelectorAll(".ac-item[data-id]").forEach(el=>{
    const item={onclick:()=>{ const o=DATA.find(r=>r[COL.orderId]===el.dataset.id); commitSearch(el.dataset.id); acBox.classList.remove("show"); if(o) openDrawer(o); }};
    el.onclick=item.onclick; acItems.push(item);
  });
  acBox.querySelectorAll(".ac-item[data-recent]").forEach(el=>{
    const item={onclick:()=>{ gInput.value=el.dataset.recent; commitSearch(el.dataset.recent); acBox.classList.remove("show"); }};
    el.onclick=item.onclick; acItems.push(item);
  });
  const clr=$("#clrRecent"); if(clr) clr.onclick=e=>{ e.stopPropagation(); recentSearches=[]; saveRecent(); buildAutocomplete(gInput.value.trim()); };
}
function acHl(text,q){
  text=""+(text||""); const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(text);
  return esc(text.slice(0,i))+"<mark>"+esc(text.slice(i,i+q.length))+"</mark>"+esc(text.slice(i+q.length));
}
function paintAcSel(){ acBox.querySelectorAll(".ac-item").forEach((el,i)=>el.classList.toggle("sel",i===acIndex)); }

function commitSearch(q){
  gInput.value=q; globalQuery=q;
  if(q && q.length>=2){ recentSearches=[q,...recentSearches.filter(s=>s!==q)].slice(0,6); saveRecent(); }
  tblPage=1; apply();
}

/* recent searches persistence (in-memory + best-effort) */
function loadRecent(){ try{ return JSON.parse(window._recent||"[]"); }catch(e){ return []; } }
function saveRecent(){ window._recent=JSON.stringify(recentSearches); }

/* keyboard: "/" focuses search */
document.addEventListener("keydown",e=>{
  if(e.key==="/" && document.activeElement!==gInput && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)){
    e.preventDefault(); gInput.focus();
  }
});
